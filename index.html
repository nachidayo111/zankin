<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>残り金額管理</title>
</head>
<body>

<h2>お金管理</h2>

<p>収入: <span id="income">0</span>円</p>
<p>使用額: <span id="used">0</span>円</p>
<p id="remain">あと 0円</p>

<input type="number" id="incomeInput" placeholder="収入">
<button onclick="addIncome()">追加</button>

<br><br>

<input type="number" id="expenseInput" placeholder="支出">
<button onclick="addExpense()">追加</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "ここに貼る",
  authDomain: "ここに貼る",
  projectId: "ここに貼る",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let income = 0;
let used = 0;

async function loadData() {
  const ref = doc(db, "money", "main");
  const snap = await getDoc(ref);

  if (snap.exists()) {
    income = snap.data().income;
    used = snap.data().used;
  }

  update();
}

async function saveData() {
  await setDoc(doc(db, "money", "main"), {
    income,
    used
  });
}

function update() {
  let remain = income - used;

  document.getElementById("income").innerText = income;
  document.getElementById("used").innerText = used;
  document.getElementById("remain").innerText =
    "あと " + remain.toLocaleString() + "円";
}

window.addIncome = async function () {
  income += Number(document.getElementById("incomeInput").value);
  await saveData();
  update();
};

window.addExpense = async function () {
  used += Number(document.getElementById("expenseInput").value);
  await saveData();
  update();
};

loadData();
</script>

</body>
</html>
