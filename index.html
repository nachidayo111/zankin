<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>残り金額管理</title>
<style>
body{
    font-family:sans-serif;
    text-align:center;
    padding:20px;
}
.box{
    max-width:350px;
    margin:auto;
    border:1px solid #ccc;
    border-radius:15px;
    padding:20px;
}
input,button{
    width:220px;
    padding:10px;
    margin:8px;
    font-size:16px;
}
#remain{
    font-size:30px;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="box">
    <h2>残り金額管理</h2>

    <p>収入: <span id="income">0</span>円</p>
    <p>使用額: <span id="used">0</span>円</p>
    <p id="remain">あと 0円</p>

    <input type="number" id="incomeInput" placeholder="収入入力">
    <br>
    <button onclick="addIncome()">収入追加</button>

    <br><br>

    <input type="number" id="expenseInput" placeholder="使った金額">
    <br>
    <button onclick="addExpense()">支出追加</button>
</div>

<script>
let income = Number(localStorage.getItem("income")) || 0;
let used = Number(localStorage.getItem("used")) || 0;

function updateDisplay(){
    let remain = income - used;

    document.getElementById("income").innerText = income.toLocaleString();
    document.getElementById("used").innerText = used.toLocaleString();
    document.getElementById("remain").innerText =
        "あと " + remain.toLocaleString() + "円";

    localStorage.setItem("income", income);
    localStorage.setItem("used", used);
}

function addIncome(){
    let value = Number(document.getElementById("incomeInput").value);

    if(!value) return;

    income += value;
    document.getElementById("incomeInput").value = "";
    updateDisplay();
}

function addExpense(){
    let value = Number(document.getElementById("expenseInput").value);

    if(!value) return;

    used += value;
    document.getElementById("expenseInput").value = "";
    updateDisplay();
}

updateDisplay();
</script>

</body>
</html>
